name: "ado-feature-review"
description: "Six-dimension feature audit for strategic investment readiness"
version: "1.0.0"
author: "Amplihack Team"
tags: ["ado", "review", "feature"]

context:
  work_item_id: ""
  selected_workspace: ""
  feature_data: ""
  comments: ""
  revisions: ""
  child_stories: ""
  grading_results: ""
  meta_findings: ""
  grade_card: ""
  user_action: ""
  selected_lenses: ""
  lawyer_perspective: ""
  economist_perspective: ""
  anthropologist_perspective: ""
  psychologist_perspective: ""
  analyst_summary: ""

steps:
  # Phase 2: Deterministic fetch
  - id: "fetch-feature"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_work_item.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --relations --format json
    output: "feature_data"

  - id: "fetch-comments"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_comments.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --format json
    output: "comments"

  - id: "fetch-revisions"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_revisions.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --format json
    output: "revisions"

  - id: "fetch-child-stories"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/query_wiql.py \
        --workspace "{{selected_workspace}}" \
        --wiql "SELECT [System.Id],[System.Title],[System.State] \
          FROM WorkItemLinks WHERE [Source].[System.Id] = {{work_item_id}} \
          AND [System.Links.LinkType] = 'System.LinkTypes.Hierarchy-Forward' \
          MODE (MustContain)" \
        --format json
    output: "child_stories"

  # Phase 2b: Smart analyst lens selection + parallel perspectives
  - id: "select-analyst-lenses"
    type: "agent"
    prompt: |
      Based on this feature's content, select which analyst lenses are most relevant.
      Be selective — only choose lenses where the content genuinely warrants that perspective.
      Choose 1-3 lenses maximum.

      Lenses and their triggers:
      - lawyer: privacy, PII, data collection, payments, compliance, regulation, contracts,
                consumer protection, legal agreements, liability, terms of service
      - economist: pricing, revenue, conversion rates, ROI, cost reduction, business case,
                   demand, market share, monetization, cost-benefit, economic incentives
      - anthropologist: user behavior patterns, cultural context, travel rituals, social dynamics,
                        personas, habits, community, identity, group behavior, life events
      - psychologist: trust, anxiety, cognitive load, mental models, motivation, habit formation,
                      onboarding, fear, decision-making, emotional response, UX friction

      Output ONLY a comma-separated list of selected lens names, nothing else.
      Examples: "lawyer,economist" or "anthropologist,psychologist" or "economist"

      Feature data: {{feature_data}}
      Comments: {{comments}}
    output: "selected_lenses"

  - id: "analyst-lawyer"
    type: "agent"
    condition: "'lawyer' in selected_lenses"
    prompt: |
      Apply a legal/compliance lens to this feature.
      Focus on: privacy/PII risks, regulatory requirements (aviation, consumer protection,
      data residency), third-party contractual constraints, liability exposure.

      3-5 specific, actionable observations. Flag what needs legal review before shipping.
      Be direct and PM-readable — not academic.

      Reference: amplifier-bundle/skills/lawyer-analyst/QUICK_REFERENCE.md

      Feature data: {{feature_data}}
    output: "lawyer_perspective"

  - id: "analyst-economist"
    type: "agent"
    condition: "'economist' in selected_lenses"
    prompt: |
      Apply an economics lens to this feature.
      Focus on: incentive structures, demand-side reasoning, opportunity cost, whether
      the business case holds up, whether the proposed metrics capture real economic value,
      potential unintended economic effects (cannibalization, price anchoring, etc.).

      3-5 specific, actionable observations.
      Be direct and PM-readable — not academic.

      Reference: amplifier-bundle/skills/economist-analyst/QUICK_REFERENCE.md

      Feature data: {{feature_data}}
    output: "economist_perspective"

  - id: "analyst-anthropologist"
    type: "agent"
    condition: "'anthropologist' in selected_lenses"
    prompt: |
      Apply an anthropological lens to this feature.
      Focus on: whether user behavior assumptions reflect actual behavioral patterns,
      cultural/social context of the use case, travel rituals and identity, group dynamics,
      whether the Without/With framing is grounded in real ethnographic reality.

      3-5 specific, actionable observations.
      Be direct and PM-readable — not academic.

      Reference: amplifier-bundle/skills/anthropologist-analyst/QUICK_REFERENCE.md

      Feature data: {{feature_data}}
    output: "anthropologist_perspective"

  - id: "analyst-psychologist"
    type: "agent"
    condition: "'psychologist' in selected_lenses"
    prompt: |
      Apply a psychology lens to this feature.
      Focus on: user trust, anxiety reduction/introduction, cognitive load, mental models
      being assumed vs. actual, motivation structures, habit formation, emotional responses
      at key moments in the user journey.

      3-5 specific, actionable observations.
      Be direct and PM-readable — not academic.

      Reference: amplifier-bundle/skills/psychologist-analyst/QUICK_REFERENCE.md

      Feature data: {{feature_data}}
    output: "psychologist_perspective"

  - id: "compile-analyst-summary"
    type: "agent"
    prompt: |
      Compile the analyst perspectives below into a single concise advisory block
      (max 200 words). Only include lenses that produced findings.
      Group by lens. If no perspectives were selected, output exactly:
      "No analyst perspectives selected for this feature."

      Lenses selected: {{selected_lenses}}
      Lawyer: {{lawyer_perspective}}
      Economist: {{economist_perspective}}
      Anthropologist: {{anthropologist_perspective}}
      Psychologist: {{psychologist_perspective}}
    output: "analyst_summary"

  # Phase 3: Six-dimension grading
  - id: "grade-feature"
    type: "agent"
    agent: "amplihack:ado-feature-author"
    prompt: |
      Grade this feature across six dimensions (A-F):

      1. **Strategic clarity** — Problem-first framing, OKR alignment, customer terms
      2. **Discovery/validation** — Assumptions identified, evidence cited, risks acknowledged
      3. **Pitch quality** — Alaska template compliance, Without/With framing, all three Win audiences
      4. **Outcome metrics** — North Star + leading indicators, baseline + target, evidence-backed
      5. **Slicability** — Can it decompose into 3-7 stories? Propose candidate story titles
      6. **Delivery feasibility** — Scope vs past team velocity, rollout strategy, exit criteria

      Use MCP for: wiki templates, OKR searches, past comparable features, industry benchmarks.
      Child stories are evidence of decomposition — grade coverage, don't grade individual story quality.

      Reference checklists:
      - amplifier-bundle/skills/common/checklists/ado/ado-feature-author.md
      - amplifier-bundle/skills/common/checklists/ado/ado-metrics-coach.md
      - amplifier-bundle/skills/common/checklists/ado/ado-story-architect.md

      Analyst perspectives (advisory — use to deepen analysis, not as separate dimensions):
      {{analyst_summary}}

      Feature data: {{feature_data}}
      Comments: {{comments}}
      Revisions: {{revisions}}
      Child stories: {{child_stories}}
    output: "grading_results"

  # Phase 2.5: Meta-findings
  - id: "meta-findings"
    type: "agent"
    prompt: |
      Review grading for gaps, contradictions, or missed issues.
      Inter-dimension contradictions? Grading inconsistencies?

      Grading results: {{grading_results}}
    output: "meta_findings"

  # Phase 3: Grade card synthesis
  - id: "compile-grade-card"
    type: "agent"
    prompt: |
      Synthesize into grade card.
      Overall = lowest dimension + one letter up if others are strong.
      Include candidate story titles from slicability dimension.

      Format:
      - Letter grade (A-F) per dimension with justification
      - Overall grade with reasoning
      - Top improvements with concrete suggestions
      - Candidate story titles (from slicability)

      Grading: {{grading_results}}
      Meta-findings: {{meta_findings}}
    output: "grade_card"

  # Phase 4: Conversational actions + recommendations
  - id: "action-options"
    type: "agent"
    prompt: |
      Present the grade card:

      {{grade_card}}

      Recommend next steps (dialogue out — do not execute these):
      - If stories appear missing: "Use ado-story-creation to create stories, referencing parent feature #{{work_item_id}}"
      - If existing child stories need review: "Run ado-story-review on stories listed above"

      Available actions (can execute):
      1. **Post review** — add grade card as ADO comment
      2. **Improve feature** — apply fixes based on findings (needs review context)
      3. **Argue back** — challenge specific grades
      4. **Done**

      Execute user's choice. Never block. PM has final say.
    output: "user_action"

  # Phase 4b: Improve sub-recipe (internal only)
  - id: "improve-feature"
    type: "recipe"
    recipe: "ado-feature-improve"
    condition: "'improve' in user_action.lower()"
    sub_context:
      work_item_id: "{{work_item_id}}"
      selected_workspace: "{{selected_workspace}}"
      grade_card: "{{grade_card}}"
      grading_results: "{{grading_results}}"

  # Phase 5: Reflection
  - id: "reflect"
    type: "agent"
    prompt: |
      Store discovery for category "ado-feature-review":
      - Feature ID: #{{work_item_id}}
      - Final grades, key issues, team patterns
      - User action taken

      Grade card: {{grade_card}}
      Action: {{user_action}}
    output: "reflection"
