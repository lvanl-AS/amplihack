name: "CAB_change-request-doc"
description: "Generate a Change Request Summary document from ADO stories, parent features, and linked PRs. Includes Risk Decision Tree classification, Cherwell form mapping, and docx export."
version: "6.0.0"
author: "Amplihack Team"
tags: ["release", "change-request", "change-management"]

context:
  selected_workspace: ""
  # Primary input: story IDs (comma-separated)
  story_ids: ""
  # Optional: feature ID to expand into story IDs
  feature_id: ""
  # auth_status is written by step 1 but not read downstream;
  # retained because the recipe runner requires output targets to be declared.
  auth_status: ""
  expanded_story_ids: ""
  all_story_ids: ""
  stories_data: ""
  feature_ids: ""
  features_data: ""
  linked_prs: ""
  checkpoint_result: ""
  additional_pr_ids: ""
  additional_prs: ""
  repo_names: ""
  deployment_configs: ""
  pipeline_data: ""
  cr_template: ""
  ado_context: ""
  code_changes: ""
  risk_classification: ""
  cherwell_form_offer: ""
  cherwell_form_result: ""
  draft_auto_sections: ""
  draft_rollback: ""
  draft_alerting: ""
  coherence_result: ""
  combined_draft: ""
  reviewed_cr: ""
  user_approval: ""
  final_cr: ""
  docx_path: ""
  cram_offer: ""
  cram_result: ""
  persist_status: ""
  cleanup_status: ""
  reflection: ""

steps:
  # ============================================================
  # Phase 1a: Story & Feature Fetch
  # Get all stories, find parent features, fetch linked PRs.
  # Entry: story_ids (required) or feature_id (optional convenience).
  # ============================================================

  # Step 1: Auth check
  - id: "auth-check"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/auth_check.py \
        --workspace "{{selected_workspace}}" --quiet
    output: "auth_status"

  # Step 2: If feature_id provided, expand to child story IDs
  - id: "expand-feature"
    type: "bash"
    condition: "feature_id != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/extract_child_ids.py \
        --parent-id {{feature_id}} \
        --workspace "{{selected_workspace}}"
    output: "expanded_story_ids"

  # Step 3: Combine story_ids + expanded_story_ids, deduplicate
  - id: "combine-story-ids"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/combine_ids.py <<'IDS_EOF'
      {{story_ids}}
      {{expanded_story_ids}}
      IDS_EOF
    output: "all_story_ids"

  # Step 4: Fetch all stories with relations
  - id: "fetch-stories"
    type: "bash"
    condition: "all_story_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/fetch_child_stories.py \
        --ids "{{all_story_ids}}" \
        --workspace "{{selected_workspace}}"
    output: "stories_data"

  # Step 5: Extract parent feature IDs from story relations
  - id: "extract-parent-features"
    type: "bash"
    condition: "stories_data != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/extract_parent_ids.py <<'STORIES_EOF'
      {{stories_data}}
      STORIES_EOF
    output: "feature_ids"

  # Step 6: Fetch parent features for context
  - id: "fetch-features"
    type: "bash"
    condition: "feature_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/fetch_child_stories.py \
        --ids "{{feature_ids}}" \
        --workspace "{{selected_workspace}}"
    output: "features_data"

  # Step 7: Fetch linked PRs for all stories
  - id: "fetch-linked-prs"
    type: "bash"
    condition: "all_story_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_linked_prs.py \
        --ids "{{all_story_ids}}" \
        --workspace "{{selected_workspace}}" \
        --detail
    output: "linked_prs"

  # ============================================================
  # Phase 1b: PR Checkpoint
  # Present what we found. Show stories + PRs for confirmation.
  # Ask about additional PRs only.
  # ============================================================

  # Step 8: Present stories + PRs, ask for additional PRs
  - id: "pr-checkpoint"
    type: "agent"
    prompt: |
      You are reviewing the contents of a deployment before generating a
      Change Request document.

      Present a clean summary of what was found:

      **Stories in this Change Request:**
      For each story, show: ID, Title, State, Assigned To

      **Parent Feature(s):**
      For each feature, show: ID, Title

      **PRs linked to stories:**
      For each PR, show: PR ID, Title, Repository, Status, Linked Story ID

      Stories: {{stories_data}}
      Features: {{features_data}}
      Linked PRs: {{linked_prs}}

      Then ask:

      "These PRs were found automatically from your ADO stories.
      Are there any additional PRs that should be included in this
      change request? These could be standalone PRs not linked to any
      story, or PRs you want to make sure are captured.
      Provide PR IDs (comma-separated), or say 'none'."

      After the user responds, confirm the complete list.

      Your FINAL message MUST end with exactly this block:
      ===ADDITIONAL_DATA===
      PRS: <comma-separated additional PR IDs, or leave blank>
      ===END_ADDITIONAL_DATA===
    output: "checkpoint_result"

  # Step 9: Parse additional PR IDs from checkpoint
  - id: "parse-additional-prs"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/parse_checkpoint.py --field prs <<'CHECKPOINT_EOF'
      {{checkpoint_result}}
      CHECKPOINT_EOF
    output: "additional_pr_ids"

  # Step 10: Fetch additional standalone PRs
  - id: "fetch-additional-prs"
    type: "bash"
    condition: "additional_pr_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/fetch_prs_by_ids.py \
        --ids "{{additional_pr_ids}}" \
        --workspace "{{selected_workspace}}" \
        --detail
    output: "additional_prs"

  # ============================================================
  # Phase 2: Deployment Data Fetch
  # Now we know all stories and PRs. Fetch deployment configs
  # and pipeline data for every repo involved.
  # ============================================================

  # Step 11: Extract unique repo names from all PR sources
  - id: "extract-repo-names"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/extract_repo_names.py <<'PR_DATA_EOF'
      {{linked_prs}}
      ===SOURCE===
      {{additional_prs}}
      PR_DATA_EOF
    output: "repo_names"

  # Step 12: Fetch deployment.yaml from each repo
  - id: "fetch-deployment-configs"
    type: "bash"
    condition: "repo_names != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_repo_file.py \
        --repository "{{repo_names}}" \
        --path deployment.yaml \
        --workspace "{{selected_workspace}}"
    output: "deployment_configs"

  # Step 13: Fetch pipeline definitions and recent runs
  - id: "fetch-pipeline-data"
    type: "bash"
    condition: "repo_names != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_pipeline_runs.py \
        --repositories "{{repo_names}}" \
        --workspace "{{selected_workspace}}" \
        --top 5
    output: "pipeline_data"

  # Step 14: Load CR template reference
  - id: "load-cr-template"
    type: "bash"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      cat "$REPO_ROOT/amplifier-bundle/skills/common/templates/reference_cr_template.md"
    output: "cr_template"

  # ============================================================
  # Phase 3: Expert Understanding
  # Two experts produce structured reference documents.
  # Downstream agents use these instead of raw data.
  # ============================================================

  # Step 15: ADO Context Expert — what and why
  - id: "ado-context-expert"
    type: "agent"
    agent: "ado-context-expert"
    prompt: |
      Build a structured context reference document from the ADO data.
      This will be the primary source of "what is this change and why"
      for all downstream section drafters.

      Organize your findings into General Findings, Testing & Verification,
      then one section per CR template section. Here are the specific
      questions each template section needs answered from ADO data:

      **Section 1 — Deployment Details needs from you:**
      - What Service / Component is this? (from feature/story titles)
      - What is the Change Summary? (feature desc + story summaries, written for BUSINESS PARTNER audience — avoid jargon)
      - For multi-service changes, organize by service with story IDs
      - Are Target Environments mentioned in any story or AC?
      - Is deployment timing or sequencing mentioned anywhere?
      - List all ADO Items: Story IDs, Bug IDs, titles, types

      **Section 2 — Impacted Systems needs from you:**
      - What systems or services are named in story descriptions or AC?
      - **CRITICAL: Is any system Account, BTS, ABD, or CSA Mobile?** (Ground Stop / Day-of-Travel = automatic HIGH risk)
      - **Is any system a shared service / API consumed by multiple apps?** (= automatic HIGH risk)
      - What dependencies between systems are mentioned?
      - Any upstream or downstream systems referenced?
      - What guest flows or touchpoints are affected? (user-facing behaviors)

      **Section 3 — Rollback Strategy needs from you:**
      - What would indicate failure? (inverse of success criteria from AC)
      - Are any irreversible changes mentioned in requirements?

      **Section 4 — Alerting & Monitoring needs from you:**
      - Any performance requirements or SLAs in AC? (response times, throughput)
      - What does success look like? (translate AC into observable verification criteria)
      - Which systems need monitoring based on story scope?

      **Section 5 — Documentation Links needs from you:**
      - All story IDs and titles in scope
      - All feature IDs and titles

      **Risk Decision Tree needs from you:**
      - Blast radius: does this change affect all users, some users, or limited scope?
      - Is this guest-facing or internal-only?
      - Any signals about testing in mirror environments?

      Stories: {{stories_data}}
      Features: {{features_data}}
    output: "ado_context"

  # Step 16: Code Changes Expert — how and where
  - id: "code-changes-expert"
    type: "agent"
    agent: "code-changes-expert"
    prompt: |
      Build a structured code changes reference document from all PR data.
      Combine linked PRs and any additional standalone PRs into a single
      analysis. This will be the primary source of "how is this change
      implemented and where" for all downstream section drafters.

      Organize your findings into General Findings, Testing & Verification,
      then one section per CR template section. Here are the specific
      questions each template section needs answered from PR data:

      **Section 1 — Deployment Details needs from you:**
      - Which repos are involved and how many PRs each?
      - What target branches? (indicates environment)
      - Any deployment or pipeline config files in the diffs?
      - What changed per repo? (brief summary, not file list)
      - Version/build tag information if available

      **Section 2 — Impacted Systems needs from you:**
      - Which systems are directly modified? (from repo names)
      - **CRITICAL: Is any repo/service Account, BTS, ABD, or CSA Mobile?** (Ground Stop / Day-of-Travel = automatic HIGH risk)
      - **Is any repo/service consumed by multiple apps/teams?** (shared service = automatic HIGH risk)
      - **Any feature flag changes detected?** (feature flags ARE changes requiring CRs per AAG Q&A)
      - What subsystems within each repo? (API, DB, workers from file paths)
      - Any systems mentioned in PR descriptions but not directly changed?

      **Section 3 — Rollback Strategy needs from you:**
      - Any migration or schema files detected in diffs?
      - Any config changes that could be irreversible?
      - Cross-repo dependencies that affect deployment/rollback ordering?
      - Any data transformation scripts?
      - **Fail-forward signal**: Are there irreversible changes where rollback is not possible?

      **Section 4 — Alerting & Monitoring needs from you:**
      - Which repos had the largest changes? (need most monitoring)
      - Any changes to monitoring or alerting config files?
      - What types of changes suggest specific monitoring?

      **Section 5 — Documentation Links needs from you:**
      - All PR IDs, titles, and URLs
      - All repo names involved

      **Cherwell Classify Fields needs from you:**
      - What Are You Changing? (Application Code, Server, Database, etc.)
      - Complexity signal (repo count, team count)
      - Automation signal (pipeline-deployed?)
      - Back-out duration signal (estimated rollback time from pipeline data)
      - Success count signal (how many successful pipeline runs?)
      - Test evidence signal (test files in diffs?)

      **Risk Decision Tree needs from you:**
      - Number of systems directly modified
      - Blast radius if any repo fails
      - Mirror testing signal

      Linked PRs: {{linked_prs}}
      Additional PRs: {{additional_prs}}
    output: "code_changes"

  # ============================================================
  # Phase 4: Risk Decision Tree Classification
  # Deterministic risk classification from expert outputs.
  # Informs Change Type guidance and approval routing.
  # ============================================================

  # Step 17: Risk Decision Tree classification
  - id: "risk-decision-tree"
    type: "agent"
    prompt: |
      Classify this change using the Alaska Airlines Risk Decision Tree v0.93.
      This is a DETERMINISTIC algorithm — follow the tree exactly.

      DECISION TREE (evaluate in order, stop at first match):

      1. Does this change impact or interact with a Ground Stop App or
         Customer Facing App? (Account, BTS, ABD, CSA Mobile)
         Check ADO Context → Section 2 → Ground Stop flags
         Check Code Changes → Section 2 → Ground Stop flags
         → YES → **HIGH RISK**

      2. Does the change affect any Shared Service?
         (Network, middleware, API consumed by multiple apps/teams)
         Check ADO Context → Section 2 → Shared Service flags
         Check Code Changes → Section 2 → Shared Service / Multi-Consumer API flags
         → YES → **HIGH RISK**

      3. If the Change Fails, what is the blast radius?
         Check ADO Context → Risk Decision Tree → Blast Radius Assessment
         Check Code Changes → Risk Decision Tree → Blast Radius from Code Perspective
         → All Users → **HIGH RISK**
         → Some Users → **MEDIUM RISK**

      4. Change is fully tested in a mirror of the live environment?
         Check ADO Context → Risk Decision Tree → Testing Completeness Signal
         Check Code Changes → Risk Decision Tree → Mirror Testing Signal
         → Less than 100% Tested → **MEDIUM RISK**
         → 100% Successfully Tested → **LOW RISK**

      5. All Other Changes:
         → If Standard Change → **LOW RISK**
         → Otherwise → **MEDIUM RISK**

      OUTPUT your classification as:
      ===RISK_CLASSIFICATION===
      RISK_LEVEL: <LOW/MEDIUM/HIGH>
      TREE_BRANCH: <which branch was triggered — e.g., "Ground Stop App detected: Account">
      GROUND_STOP: <true/false>
      SHARED_SERVICE: <true/false>
      BLAST_RADIUS: <all_users/some_users/limited/unknown>
      MIRROR_TESTED: <yes/no/unknown>

      APPROVAL_REQUIRED:
      - <list each required approval based on risk level>
      - Normal period: <approvals needed>
      - Soft freeze (Fri-Sun): <additional approvals if applicable>
      - Hard freeze: <additional approvals if applicable>

      CHANGE_TYPE_GUIDANCE:
      - <If HIGH and might be Standard → "Cannot use Standard Change path. Must submit as Normal CR.">
      - <If risk level suggests specific change type guidance>

      DEADLINE_REMINDER:
      - Friday 6:00 PM PST: CR submission deadline for Monday VP review
      - Thursday 2:00 PM PST: CAB meeting
      ===END_RISK_CLASSIFICATION===

      ADO Context: {{ado_context}}
      Code Changes: {{code_changes}}
    output: "risk_classification"

  # Persist expert context to working directory for context compaction resilience
  - id: "persist-expert-context"
    type: "bash"
    condition: "ado_context != '' and code_changes != ''"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      WORKING_DIR="$REPO_ROOT/.claude/runtime/cab_working"
      mkdir -p "$WORKING_DIR"
      cat <<'PERSIST_ADO_EOF' > "$WORKING_DIR/ado_context.md"
      {{ado_context}}
      PERSIST_ADO_EOF
      cat <<'PERSIST_CODE_EOF' > "$WORKING_DIR/code_changes.md"
      {{code_changes}}
      PERSIST_CODE_EOF
      cat <<'PERSIST_RISK_EOF' > "$WORKING_DIR/risk_classification.md"
      {{risk_classification}}
      PERSIST_RISK_EOF
      cat <<'PERSIST_PIPE_EOF' > "$WORKING_DIR/pipeline_data.md"
      {{pipeline_data}}
      PERSIST_PIPE_EOF
      cat <<'PERSIST_DEPLOY_EOF' > "$WORKING_DIR/deployment_configs.md"
      {{deployment_configs}}
      PERSIST_DEPLOY_EOF
      echo "Persisted expert context to $WORKING_DIR"
    output: "persist_status"

  # ============================================================
  # Phase 5: Section Drafting
  # Section drafters use expert outputs, not raw data.
  # Rollback drafter also gets raw deployment/pipeline data.
  # ============================================================

  # Step 18: Draft Deployment Details, Impacted Systems, Documentation Links
  - id: "draft-auto-sections"
    type: "agent"
    agent: "cr-auto-sections"
    prompt: |
      Draft Section 1 (Deployment Details), Section 2 (Impacted Systems),
      and Section 5 (Documentation Links) of the Change Request Summary.

      Use these expert references — do NOT request raw ADO or PR data:

      ADO Context (what/why): {{ado_context}}
      Code Changes (how/where): {{code_changes}}
      Risk Decision Tree Classification: {{risk_classification}}
      CR Template: {{cr_template}}
    output: "draft_auto_sections"

  # Step 19: Draft Rollback Strategy
  - id: "draft-rollback"
    type: "agent"
    agent: "cr-rollback-drafter"
    prompt: |
      Draft Section 3 (Rollback Strategy) of the Change Request Summary.
      Ground every statement in deployment configs, pipeline data, or
      explicit questions to the user. Never infer or guess.

      ADO Context (what/why): {{ado_context}}
      Code Changes (how/where): {{code_changes}}
      Deployment configs per repo: {{deployment_configs}}
      Pipeline data per repo: {{pipeline_data}}
      CR Template: {{cr_template}}
    output: "draft_rollback"

  # Step 20: Draft Alerting & Monitoring
  - id: "draft-alerting"
    type: "agent"
    agent: "cr-alerting-drafter"
    prompt: |
      Draft Section 4 (Alerting and Monitoring) of the Change Request Summary.

      ADO Context (what/why): {{ado_context}}
      Code Changes (how/where): {{code_changes}}
      CR Template: {{cr_template}}
    output: "draft_alerting"

  # ============================================================
  # Phase 6: Coherence Check
  # ============================================================

  # Step 21: Review all sections for contradictions
  - id: "coherence-check"
    type: "agent"
    agent: "cr-coherence-checker"
    prompt: |
      Review all drafted sections together for coherence and contradictions.

      Check for:
      1. Systems coverage — every system in Section 2 must appear in
         Section 3 (Rollback) and Section 4 (Success Criteria)
      2. Rollback alignment — rollback steps must cover all primary systems
      3. Success Criteria coverage — each change in Section 1 should have
         a corresponding success criterion in Section 4
      4. Rollback time vs complexity — realistic?
      5. Risk Level consistency — Section 2 risk level matches rollback
         thoroughness and monitoring depth
      6. Ground Stop / Shared Service consistency
      7. Fail-forward completeness (if applicable)
      8. CR Manifest completeness — Runbook field in Section 5
      9. ADO Items vs Change Summary alignment
      10. Style Guide compliance — Change Title uses standard vocabulary
          (Deploy, Release, Patch, Install, Upgrade, Decommission, Restart,
          Reboot) and follows [Location]+[action]+[object]+[modifier]+[scope]

      Produce 0-7 specific flags.

      Section 1+2+5 (auto): {{draft_auto_sections}}
      Section 3 (rollback): {{draft_rollback}}
      Section 4 (alerting): {{draft_alerting}}
      Risk Decision Tree Classification: {{risk_classification}}
      Expert risk signals (for cross-check only):
      ADO Context: {{ado_context}}
      Code Changes: {{code_changes}}
    output: "coherence_result"

  # ============================================================
  # Phase 7: Combine + User Review
  # ============================================================

  # Step 22: Combine sections into single document
  - id: "combine-sections"
    type: "agent"
    prompt: |
      Combine the separately drafted sections into a single Change Request
      Summary document. Apply any coherence check flags by noting them
      inline as "[coherence note: ...]" for the user to resolve.

      Document structure (must match this order):

      # Change Request Summary for CR#[XXXXXX]
      **Deployment Overview for IT Teams and Change Managers**

      **Risk Level: [LOW/MEDIUM/HIGH]** — [tree branch reasoning]
      **Approval Required**: [list approvals based on risk level]

      ## 1. Deployment Details
      [Table: Service/Component, Change Summary, Version, Change Request Link, ADO Items]

      ## 2. Impacted Systems
      [Table: Primary Systems, Downstream/Upstream Dependencies, Guest Flows/Touchpoints, Risk Level]

      ## 3. Rollback Strategy
      [Italic instruction line, then Table: Rollback Method, Rollback Owner, Rollback Trigger, Estimated Rollback Time, Rollback Steps]

      ## 4. Alerting and Monitoring
      [Table: Dashboards, Alerts, On-Call Channel, Success Criteria]

      ## 5. Documentation Links
      [Table: RBX, MBX, Runbook, Testing Documentation]

      ## 6. Proof of Testing
      [Placeholder for user to add evidence]

      _Note: Replace bracketed placeholders before submitting for change management approval._

      Risk Classification: {{risk_classification}}
      Section 1+2+5 (auto): {{draft_auto_sections}}
      Section 3 (rollback): {{draft_rollback}}
      Section 4 (alerting): {{draft_alerting}}
      Coherence flags: {{coherence_result}}
    output: "combined_draft"

  # Step 23: Section-by-section review with user
  - id: "review-sections"
    type: "agent"
    prompt: |
      Walk through the CR draft section by section with the user.

      For each section (1 through 5):
      1. Show the section content
      2. Highlight [auto] fields — "Filled from your data, please verify"
      3. Highlight [draft] fields — "Please review"
      4. Flag [inferred — flagged] fields — "Based on available data, needs confirmation"
      5. Collect [needs input] fields — ask user
      6. If there are [coherence note] flags, present and ask user to resolve
      7. Accept edits to any field

      For Section 6 (Proof of Testing):
      - Ask: "Please provide proof of testing for this change. This can include:
        - Pipeline run screenshots (Build, Test, QA stages)
        - UI screenshots showing the change works correctly
        - Postman/API response screenshots
        - Screen recordings or video links
        - Brief descriptions of what each piece of evidence demonstrates"
      - Collect the user's evidence and descriptions.

      After all 6 sections are reviewed, show the complete updated document.

      CR Draft: {{combined_draft}}
    output: "reviewed_cr"

  # ============================================================
  # Phase 7: Finalize + Offer Sub-Recipes
  # ============================================================

  # Step 24: Final approval
  - id: "approval-gate"
    type: "agent"
    prompt: |
      Present the final Change Request Summary document.

      "Here's your complete Change Request Summary. Ready to finalize?"

      Show the full document cleanly formatted (no confidence markers —
      those were for the review phase).

      User confirms -> include the final document in your response.
      User wants changes -> make the changes and include the updated document.

      Your FINAL message MUST end with exactly one of these sentinels:
      ===CR_APPROVED===
      [the complete final document here]
      ===END_CR===

      Always include the sentinel block with the document, even if the
      user requested changes (apply changes first, then output).

      Document: {{reviewed_cr}}
    output: "user_approval"

  # Step 25: Output final document as markdown
  - id: "output-cr"
    type: "agent"
    condition: "'===CR_APPROVED===' in user_approval"
    prompt: |
      Output the final Change Request Summary document.

      Format as clean markdown with proper table formatting.

      Remove all confidence markers ([auto], [draft], [needs input],
      [known], [user-confirmed], [unknown — asking], [inferred — flagged],
      [coherence note]).
      Clean formatting, professional tone.

      The document must follow this structure:
      1. Title: "Change Request Summary for CR#[XXXXXX]"
      2. Subtitle: "Deployment Overview for IT Teams and Change Managers"
      3. Section 1: Deployment Details (table)
      4. Section 2: Impacted Systems (table)
      5. Section 3: Rollback Strategy (table with italic instruction)
      6. Section 4: Alerting and Monitoring (table)
      7. Section 5: Documentation Links (table)
      8. Section 6: Proof of Testing (evidence and narratives)
      9. Footer note about placeholders

      Extract the document from between ===CR_APPROVED=== and ===END_CR===
      markers in the approval output below. Use that as the source document.

      Approval output: {{user_approval}}
    output: "final_cr"

  # Step 26: Export to .docx
  - id: "export-docx"
    type: "agent"
    condition: "final_cr != ''"
    prompt: |
      Convert the final CR markdown document to a Word document (.docx).

      Steps:
      1. Save the markdown content to a temporary .md file
      2. Use pandoc to convert to .docx:
         pandoc cr_temp.md -o "CR_Summary.docx" --from markdown --to docx
      3. Report the output file path

      If pandoc is not available, use the python-docx approach:
      1. Write a Python script that creates a .docx with:
         - Title styled as Heading 1
         - Subtitle as centered text
         - Section headers as Heading 2
         - Tables with borders and proper formatting
         - Hyperlinks preserved
      2. Save as "CR_Summary.docx" in the current directory

      The document should have:
      - Professional formatting with styled headers
      - Tables with visible borders
      - Clickable hyperlinks
      - Clean, readable layout

      Final CR content:
      {{final_cr}}
    output: "docx_path"

  # Step 27: Offer Cherwell form pre-fill
  - id: "offer-cherwell-form"
    type: "agent"
    condition: "final_cr != ''"
    prompt: |
      The Change Request document has been generated and exported.

      Ask the user:

      "Would you like to pre-fill ALL Cherwell portal form fields for this
      change? This covers:
      - 5 Classify/New Screen fields (Change Title, What/Where/How, Primary System)
      - 12 Risk Assessment Questionnaire answers
      - 4 Communication Plan fields

      All data from this CR session will be reused — no additional ADO
      fetching needed."

      If the user says yes (or any affirmative), respond with exactly:
      ===CHERWELL_YES===

      If the user says no (or any negative), respond with exactly:
      ===CHERWELL_NO===
    output: "cherwell_form_offer"

  # Step 28: Run Cherwell form recipe with shared context
  - id: "run-cherwell-form"
    type: "recipe"
    condition: "'===CHERWELL_YES===' in cherwell_form_offer"
    recipe: "amplifier-bundle/recipes/CAB_cherwell-form.yaml"
    context:
      selected_workspace: "{{selected_workspace}}"
      ado_context: "{{ado_context}}"
      code_changes: "{{code_changes}}"
      pipeline_data: "{{pipeline_data}}"
      deployment_configs: "{{deployment_configs}}"
      risk_classification: "{{risk_classification}}"
      reviewed_cr: "{{final_cr}}"
    output: "cherwell_form_result"

  # Step 29: Offer CRAM scoring
  - id: "offer-cram"
    type: "agent"
    condition: "final_cr != ''"
    prompt: |
      The Change Request document has been generated.

      Report what was produced:
      - Markdown CR document
      - Word document (.docx) if export succeeded

      Then ask:

      "Would you also like to generate a CRAM (Change Risk Assessment Matrix)
      score for this change? This uses the Alaska Airlines CRAM template —
      3 weighted categories (Business Impact, Execution Risk, Operational Risk)
      with 11 subcriteria scored 1-3, producing a weighted total (6-18).

      All the data from this CR session will be reused — no additional ADO
      fetching needed. Just the scoring and your review."

      If the user says yes (or any affirmative), respond with exactly:
      ===CRAM_YES===

      If the user says no (or any negative), respond with exactly:
      ===CRAM_NO===
    output: "cram_offer"

  # Step 30: Run CRAM recipe with shared context
  - id: "run-cram"
    type: "recipe"
    condition: "'===CRAM_YES===' in cram_offer"
    recipe: "amplifier-bundle/recipes/CAB_cram-scoring.yaml"
    context:
      selected_workspace: "{{selected_workspace}}"
      ado_context: "{{ado_context}}"
      code_changes: "{{code_changes}}"
      pipeline_data: "{{pipeline_data}}"
      deployment_configs: "{{deployment_configs}}"
      final_cr: "{{final_cr}}"
      risk_classification: "{{risk_classification}}"
    output: "cram_result"

  # Step 31: Reflection
  - id: "reflect"
    type: "agent"
    prompt: |
      Store discovery for category "CAB_change-request-doc":
      - Story count, PR count, repo count, feature count
      - How many fields were auto-filled vs drafted vs user-provided
      - Coherence flags raised and how they were resolved
      - Deployment configs found vs missing
      - Pipeline data availability
      - Whether user provided additional PRs beyond auto-discovered ones
      - Whether docx export succeeded
      - Proof of testing provided (screenshots, videos, etc.)
      - Risk Decision Tree result: classification level and which branch triggered
      - Ground Stop app detected? Which system?
      - Shared service detected? Which service?
      - Cherwell form: offered? accepted? how many of 21 fields auto-filled vs user-provided
      - Fail-forward documentation: was it needed? If so, were all 4 elements present?
      - Style Guide compliance: did Change Title follow the format?
      - Back-out duration: did minutes match the rollback narrative?
      - Patterns observed (e.g., "PRs not linked in ADO", "no deployment.yaml in repo-X")

      Final document: {{final_cr}}
      Risk Classification: {{risk_classification}}
      Cherwell Form Result: {{cherwell_form_result}}
      ADO Context: {{ado_context}}
      Code Changes: {{code_changes}}
      Coherence result: {{coherence_result}}
    output: "reflection"

  # Cleanup working files
  - id: "cleanup-working-files"
    type: "bash"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      rm -rf "$REPO_ROOT/.claude/runtime/cab_working"
      echo "Cleaned up working files"
    output: "cleanup_status"
