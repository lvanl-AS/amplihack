name: "ado-feature-creation"
description: "Conversational feature creation with value stress-test and slicability check"
version: "1.0.0"
author: "Amplihack Team"
tags: ["ado", "create", "feature"]

context:
  selected_workspace: ""
  auth_status: ""
  feature_template: ""
  user_input: ""
  topic_keywords: ""
  duplicate_candidates: ""
  parent_epic_context: ""
  parent_epic_id: ""
  has_frontend_signals: "false"
  figma_context: ""
  value_check: ""
  feature_description: ""
  stakeholders: ""
  three_audience_wins: ""
  quality_measures: ""
  acceptance_criteria: ""
  outcome_metrics: ""
  okr_alignment: ""
  candidate_stories: ""
  feature_title: ""
  revised_draft: ""
  validation_result: ""
  final_draft: ""
  pre_commit_review: ""
  user_save_decision: ""

steps:
  # Phase 1: Auth check against selected workspace
  - id: "auth-check"
    type: "bash"
    command: |
      python .claude/scenarios/az-devops-tools/auth_check.py \
        --workspace "{{selected_workspace}}" --quiet
    output: "auth_status"

  - id: "load-template"
    type: "bash"
    command: |
      cat amplifier-bundle/skills/common/templates/reference_alaska_feature_template.md
    output: "feature_template"

  # Phase 2: Extract keywords + detect signals
  - id: "extract-keywords"
    type: "agent"
    prompt: |
      From the user's input, extract:
      1. Search keywords for duplicate detection (2-4 key terms)
      2. Whether this sounds frontend-related (has_frontend_signals)

      User input: {{user_input}}
    output: "topic_keywords"

  # Phase 2c: Duplicate detection
  - id: "duplicate-search"
    type: "bash"
    command: |
      python .claude/scenarios/az-devops-tools/query_wiql.py \
        --workspace "{{selected_workspace}}" \
        --wiql "SELECT [System.Id],[System.Title],[System.State] \
          FROM WorkItems WHERE [System.WorkItemType] = 'Feature' \
          AND [System.Title] CONTAINS '{{topic_keywords}}'" \
        --format json
    output: "duplicate_candidates"

  - id: "evaluate-duplicates"
    type: "agent"
    prompt: |
      Check for potential duplicate features.
      If >70% similar: present to user, ask "update existing or create new?"
      If 40-70%: mention as context. If none: continue silently.

      Candidates: {{duplicate_candidates}}
      User's topic: {{user_input}}
    output: "duplicate_decision"

  # Phase 3: Parent epic/initiative resolution
  - id: "resolve-parent"
    type: "agent"
    prompt: |
      Determine if this feature has a parent Epic or Initiative.

      User's topic: {{user_input}}

      If user provided a work item ID, fetch via get_work_item.py.
      If they mentioned an epic/initiative name, search via MCP.
      If neither, search for likely parents and present options.
      If no parent: standalone features are fine.

      If confirmed: read the full parent — description, goals,
      existing child features. This context shapes the pitch.
    output: "parent_epic_context"

  # Phase 4: Figma check (conditional)
  - id: "figma-check"
    type: "agent"
    condition: "has_frontend_signals == 'true'"
    prompt: |
      This sounds like it might involve UI work.
      Ask: "Is there a Figma design for this?"
      If yes: confirm the design reference.
      If no: move on.
    output: "figma_context"

  # Phase 5: Value stress-test (always runs — not opt-in)
  - id: "stress-test-value"
    type: "agent"
    prompt: |
      Review the proposed feature for business value clarity.
      Not a gate — a conversation to sharpen the pitch:
      - Does the WHY hold up? Real problem, or solution looking for one?
      - Obvious assumptions leadership would question?
      - If something looks off, say so plainly. Better here than
        in a stakeholder review.

      Brief — 2-3 observations max. Banter, not interrogation.

      User's topic: {{user_input}}
      Parent context: {{parent_epic_context}}
    output: "value_check"

  # Phase 6: Sequential draft (order enforced by recipe runner)
  - id: "draft-description"
    type: "agent"
    prompt: |
      Draft WHAT and WHY sections using the feature template.
      WHY MUST use Without/With contrast framing (team convention).

      User's topic: {{user_input}}
      Value stress-test findings: {{value_check}}
      Parent context: {{parent_epic_context}}
      Template: {{feature_template}}

      Check recent discoveries (category: ado-feature-creation) for team patterns.
    output: "feature_description"

  - id: "gather-stakeholders"
    type: "agent"
    prompt: |
      Ask the user: "Who are the stakeholders for this feature?"
      NEVER invent stakeholder names. Always ask.
      Description: {{feature_description}}
    output: "stakeholders"

  - id: "draft-wins"
    type: "agent"
    prompt: |
      Draft Three-audience Wins: Guest Wins, Business Wins, Tech Wins.
      Each audience must have at least one bullet.
      Description: {{feature_description}}
      Stakeholders: {{stakeholders}}
    output: "three_audience_wins"

  - id: "draft-quality-measures"
    type: "agent"
    prompt: |
      Draft Quality Measure AC — guardrails like "no increase in X",
      "no degradation in Y". These protect against unintended harm.
      Description: {{feature_description}}
      Wins: {{three_audience_wins}}
    output: "quality_measures"

  - id: "draft-ac"
    type: "agent"
    prompt: |
      Draft functional acceptance criteria based on description and wins.
      Each AC must trace to the description.
      Description: {{feature_description}}
      Wins: {{three_audience_wins}}
      Quality measures: {{quality_measures}}
    output: "acceptance_criteria"

  - id: "research-metrics"
    type: "agent"
    prompt: |
      Propose North Star metric + 2-3 leading indicators.
      Research via MCP: past team outcomes, OKRs, industry benchmarks.
      Trace each metric to specific AC.

      If no evidence, say so — never invent numbers.

      Description: {{feature_description}}
      AC: {{acceptance_criteria}}
    output: "outcome_metrics"

  - id: "okr-alignment"
    type: "agent"
    prompt: |
      Quick OKR/strategy alignment check via MCP wiki search.
      1-2 line summary. Green check or soft flag. Never blocks.
      Description: {{feature_description}}
      AC: {{acceptance_criteria}}
    output: "okr_alignment"

  # Phase 7: Slicability check
  - id: "slicability-check"
    type: "agent"
    prompt: |
      Propose 3-7 candidate story titles that could deliver this feature.
      Titles only — no full stories, no AC, no estimates.

      This is a thinking aid, not a plan. Present as:
      "Here's one way this could break down — does this feel right?"

      If <3: "Feels vague — might be worth tightening scope."
      If 8+: "Might be bigger than one feature — worth splitting."

      Description: {{feature_description}}
      AC: {{acceptance_criteria}}
    output: "candidate_stories"

  - id: "generate-title"
    type: "agent"
    prompt: |
      Generate a title following team naming conventions.
      Outcome-oriented, concise. Derived from the full feature body.

      Description: {{feature_description}}
      AC: {{acceptance_criteria}}
      Metrics: {{outcome_metrics}}
      Candidate stories: {{candidate_stories}}
    output: "feature_title"

  # Phase 8: Iterate with user
  - id: "iterate-with-user"
    type: "agent"
    prompt: |
      Present the full draft:

      **Title:** {{feature_title}}
      **Description:** {{feature_description}}
      **Stakeholders:** {{stakeholders}}
      **Three-audience Wins:** {{three_audience_wins}}
      **Quality Measures:** {{quality_measures}}
      **AC:** {{acceptance_criteria}}
      **Metrics:** {{outcome_metrics}}
      **OKR:** {{okr_alignment}}
      **Candidate stories:** {{candidate_stories}}
      **Figma:** {{figma_context}}
      **Parent:** {{parent_epic_context}}

      Accept changes across multiple rounds. Maintain traceability.
      Loop until user says "looks good."
    output: "revised_draft"

  - id: "validate-consistency"
    type: "agent"
    prompt: |
      Check draft for internal consistency:
      - Do AC trace to description?
      - Do metrics trace to AC?
      - Do Wins cover all three audiences?
      - Does WHY use Without/With framing?
      - Does scope fit under parent (if any)?
      - Does title reflect the body?

      Draft: {{revised_draft}}
    output: "validation_result"

  - id: "re-iterate"
    type: "agent"
    condition: "'issue' in validation_result.lower()"
    prompt: |
      Show consistency issues: {{validation_result}}
      Draft: {{revised_draft}}
      Iterate until resolved or user overrides.
    output: "final_draft"

  # Phase 9: Pre-commit gate
  - id: "pre-commit-review"
    type: "agent"
    prompt: |
      Final quality review. Grade across: strategic clarity, pitch quality,
      outcome metrics, slicability, value clarity.
      Include perspective coverage (dev/QA/PM).

      Soft warnings only. Offer: fix / save as-is / cancel.

      Pre-save summary:
      - Parent epic: {{#parent_epic_context}}resolved{{/parent_epic_context}}{{^parent_epic_context}}none{{/parent_epic_context}}
      - Figma: {{#figma_context}}linked{{/figma_context}}{{^figma_context}}none{{/figma_context}}
      - Duplicate check: completed
      - Value stress-test: completed
      - Slicability: {{candidate_stories}}

      Draft: {{revised_draft}}{{final_draft}}
    output: "user_save_decision"

  # Phase 10a: Prepare manifest — agent writes files, no ADO access
  - id: "prepare-manifest"
    type: "agent"
    condition: "'save' in user_save_decision.lower()"
    prompt: |
      Prepare the final feature for creation. Write three files:

      1. /tmp/ado_new_feature_manifest.json — JSON metadata:
         {
           "type": "Feature",
           "title": "<feature title>",
           "parent_id": <integer or null>,
           "tags": ["tag1", "tag2"],
           "area": "<area path or null>",
           "iteration": "<iteration path or null>",
           "warnings": "<unresolved quality warnings text, or null>"
         }

      2. /tmp/ado_new_feature_description.md — full feature description in markdown.
         Include the Figma link in this file if one was provided.
         If attaching to a parent not reviewed this session, note that in the
         warnings field of the manifest (not as a blocker).

      3. /tmp/ado_new_feature_ac.html — acceptance criteria in HTML.

      Only create files that have content. Do NOT call any MCP tools or ADO APIs.
      The bash create step handles all ADO writes.

      Draft: {{revised_draft}}{{final_draft}}
      Parent: {{parent_epic_context}}
      Figma: {{figma_context}}
      Save decision: {{user_save_decision}}
    output: "manifest_prepared"

  # Phase 10b: Create in ADO — deterministic bash
  - id: "create-in-ado"
    type: "bash"
    condition: "'save' in user_save_decision.lower()"
    command: |
      MANIFEST="/tmp/ado_new_feature_manifest.json"
      DESC_FILE="/tmp/ado_new_feature_description.md"
      AC_FILE="/tmp/ado_new_feature_ac.html"

      if [ ! -f "$MANIFEST" ]; then
        echo "No manifest found — skipping creation."
        exit 1
      fi

      TITLE=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m.get('title',''))")
      PARENT=$(python3 -c "import json; m=json.load(open('$MANIFEST')); v=m.get('parent_id'); print(v if v else '')")
      TAGS=$(python3 -c "import json; m=json.load(open('$MANIFEST')); t=m.get('tags') or ''; print(','.join(t) if isinstance(t,list) else t)")
      AREA=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m.get('area') or '')")
      ITER=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m.get('iteration') or '')")

      CMD=(python .claude/scenarios/az-devops-tools/create_work_item.py
           --type "Feature"
           --title "$TITLE"
           --workspace "{{selected_workspace}}")

      [ -f "$DESC_FILE" ]    && CMD+=(--description "$(cat "$DESC_FILE")")
      [ -n "$PARENT" ]       && CMD+=(--parent "$PARENT")
      [ -n "$TAGS" ]         && CMD+=(--tags "$TAGS")
      [ -n "$AREA" ]         && CMD+=(--area "$AREA")
      [ -n "$ITER" ]         && CMD+=(--iteration "$ITER")
      [ -f "$AC_FILE" ]      && CMD+=(--fields "Microsoft.VSTS.Common.AcceptanceCriteria=$(cat "$AC_FILE")")

      OUTPUT=$("${CMD[@]}")
      EXIT_CODE=$?
      echo "$OUTPUT"
      echo "$OUTPUT" | grep -oE 'ID: [0-9]+' | grep -oE '[0-9]+' > /tmp/ado_new_feature_id.txt
      exit $EXIT_CODE
    output: "created_work_item"

  # Phase 10c: Post candidate stories as ADO comment
  - id: "post-candidate-stories"
    type: "bash"
    condition: "'save' in user_save_decision.lower()"
    command: |
      ITEM_ID=$(cat /tmp/ado_new_feature_id.txt 2>/dev/null)

      if [ -z "$ITEM_ID" ]; then
        echo "No work item ID — skipping candidate stories comment."
        exit 0
      fi

      python .claude/scenarios/az-devops-tools/update_work_item.py \
        --id "$ITEM_ID" \
        --workspace "{{selected_workspace}}" \
        --comment "Candidate stories (slicability check — for ado-story-creation reference):\n\n{{candidate_stories}}"
    output: "candidates_posted"

  # Phase 10d: Post warnings as ADO comment if any
  - id: "post-warnings"
    type: "bash"
    condition: "'save' in user_save_decision.lower()"
    command: |
      MANIFEST="/tmp/ado_new_feature_manifest.json"
      ITEM_ID=$(cat /tmp/ado_new_feature_id.txt 2>/dev/null)
      WARNINGS=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m.get('warnings') or '')" 2>/dev/null)

      if [ -z "$ITEM_ID" ] || [ -z "$WARNINGS" ]; then
        echo "No warnings to post."
        exit 0
      fi

      python .claude/scenarios/az-devops-tools/update_work_item.py \
        --id "$ITEM_ID" \
        --workspace "{{selected_workspace}}" \
        --comment "Pre-save quality warnings (PM accepted):\n\n$WARNINGS"
    output: "warnings_posted"

  # Phase 10e: Cleanup temp files
  - id: "cleanup-temp"
    type: "bash"
    command: |
      rm -f /tmp/ado_new_feature_manifest.json \
             /tmp/ado_new_feature_description.md \
             /tmp/ado_new_feature_ac.html \
             /tmp/ado_new_feature_id.txt
      echo "Temp files cleaned up."
    output: "cleanup_done"

  # Phase 11: Reflection
  - id: "reflect"
    type: "agent"
    prompt: |
      Store discovery for category "ado-feature-creation":
      - Feature ID, parent, key patterns
      - Value stress-test findings, slicability outcome
      - Whether user overrode quality gates

      Created: {{created_work_item}}
    output: "reflection"
