name: "ado-story-review"
description: "Five-dimension story audit with letter grades"
version: "1.0.0"
author: "Amplihack Team"
tags: ["ado", "review", "story"]

context:
  work_item_id: ""
  selected_workspace: ""
  story_data: ""
  comments: ""
  revisions: ""
  grading_results: ""
  meta_findings: ""
  grade_card: ""
  user_action: ""
  selected_lenses: ""
  lawyer_perspective: ""
  economist_perspective: ""
  anthropologist_perspective: ""
  psychologist_perspective: ""
  analyst_summary: ""

steps:
  # Phase 2: Deterministic fetch (all bash — guaranteed execution)
  - id: "fetch-story"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_work_item.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --relations --format json
    output: "story_data"

  - id: "fetch-comments"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_comments.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --format json
    output: "comments"

  - id: "fetch-revisions"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_revisions.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --format json
    output: "revisions"

  # Phase 2b: Smart analyst lens selection + perspectives
  - id: "select-analyst-lenses"
    type: "agent"
    prompt: |
      Based on this story's content, select which analyst lenses are most relevant.
      Be selective — only choose lenses where the content genuinely warrants that perspective.
      Choose 1-3 lenses maximum.

      Lenses and their triggers:
      - lawyer: privacy, PII, data collection, payments, compliance, regulation, contracts,
                consumer protection, legal agreements, liability, terms of service
      - economist: pricing, revenue, conversion rates, ROI, cost reduction, business case,
                   demand, market share, monetization, cost-benefit, economic incentives
      - anthropologist: user behavior patterns, cultural context, travel rituals, social dynamics,
                        personas, habits, community, identity, group behavior, life events
      - psychologist: trust, anxiety, cognitive load, mental models, motivation, habit formation,
                      onboarding, fear, decision-making, emotional response, UX friction

      Output ONLY a comma-separated list of selected lens names, nothing else.
      Examples: "lawyer,economist" or "anthropologist,psychologist" or "economist"

      Story data: {{story_data}}
      Comments: {{comments}}
    output: "selected_lenses"

  - id: "analyst-lawyer"
    type: "agent"
    condition: "'lawyer' in selected_lenses"
    prompt: |
      Apply a legal/compliance lens to this user story.
      Focus on: privacy/PII risks, regulatory requirements, third-party constraints,
      liability exposure. Flag what needs legal review before shipping.

      3-5 specific, actionable observations. PM-readable, not academic.

      Reference: amplifier-bundle/skills/lawyer-analyst/QUICK_REFERENCE.md

      Story data: {{story_data}}
    output: "lawyer_perspective"

  - id: "analyst-economist"
    type: "agent"
    condition: "'economist' in selected_lenses"
    prompt: |
      Apply an economics lens to this user story.
      Focus on: whether the acceptance criteria drive real economic outcomes, incentive
      alignment, unintended effects, whether the metric choice captures value.

      3-5 specific, actionable observations. PM-readable, not academic.

      Reference: amplifier-bundle/skills/economist-analyst/QUICK_REFERENCE.md

      Story data: {{story_data}}
    output: "economist_perspective"

  - id: "analyst-anthropologist"
    type: "agent"
    condition: "'anthropologist' in selected_lenses"
    prompt: |
      Apply an anthropological lens to this user story.
      Focus on: whether the persona and behavior assumptions reflect actual user patterns,
      cultural/social context of the use case, whether the story captures the real lived
      experience vs. an idealized model.

      3-5 specific, actionable observations. PM-readable, not academic.

      Reference: amplifier-bundle/skills/anthropologist-analyst/QUICK_REFERENCE.md

      Story data: {{story_data}}
    output: "anthropologist_perspective"

  - id: "analyst-psychologist"
    type: "agent"
    condition: "'psychologist' in selected_lenses"
    prompt: |
      Apply a psychology lens to this user story.
      Focus on: user trust, cognitive load, mental models being assumed, motivation
      structures, emotional friction points in the acceptance criteria.

      3-5 specific, actionable observations. PM-readable, not academic.

      Reference: amplifier-bundle/skills/psychologist-analyst/QUICK_REFERENCE.md

      Story data: {{story_data}}
    output: "psychologist_perspective"

  - id: "compile-analyst-summary"
    type: "agent"
    prompt: |
      Compile the analyst perspectives below into a single concise advisory block
      (max 200 words). Only include lenses that produced findings.
      Group by lens. If no perspectives were selected, output exactly:
      "No analyst perspectives selected for this story."

      Lenses selected: {{selected_lenses}}
      Lawyer: {{lawyer_perspective}}
      Economist: {{economist_perspective}}
      Anthropologist: {{anthropologist_perspective}}
      Psychologist: {{psychologist_perspective}}
    output: "analyst_summary"

  # Phase 3: Agent grading (MCP for wiki/template enrichment, agent judgment for grading)
  - id: "grade-story"
    type: "agent"
    agent: "amplihack:ado-story-architect"
    prompt: |
      Grade this story across five dimensions (A-F):
      1. Template compliance — does it follow the Alaska story template?
      2. AC quality — testable, behavior-focused, Gherkin, negative path covered?
      3. Writing clarity — plain English, no jargon, a stranger could understand?
      4. Business deliverable — actionable, estimable, fits in a sprint?
      5. Value clarity — benefit articulated, metric traceable to AC?

      Use MCP to fetch the story template from wiki for comparison.
      Use MCP to check parent feature for alignment.

      Reference checklist: amplifier-bundle/skills/common/checklists/ado/ado-story-architect.md

      Analyst perspectives (advisory — use to deepen analysis, not as separate dimensions):
      {{analyst_summary}}

      Story data: {{story_data}}
      Comments: {{comments}}
      Revisions: {{revisions}}
    output: "grading_results"

  # Phase 2.5: Meta-findings
  - id: "meta-findings"
    type: "agent"
    prompt: |
      Review the grading results for gaps, contradictions, or missed issues.
      Are there inter-dimension contradictions? Does one dimension's grade
      conflict with another's assessment? Any quality issues not covered?

      Grading results: {{grading_results}}
    output: "meta_findings"

  # Phase 3: Grade card synthesis
  - id: "compile-grade-card"
    type: "agent"
    prompt: |
      Synthesize grading results and meta-findings into a grade card.

      Format:
      - Letter grade (A-F) per dimension with one-line justification
      - Overall grade
      - Top 3 specific improvement suggestions with concrete rewrites
      - Strengths worth preserving

      Grading: {{grading_results}}
      Meta-findings: {{meta_findings}}
    output: "grade_card"

  # Phase 4: Conversational actions
  - id: "action-options"
    type: "agent"
    prompt: |
      Present the grade card to the user:

      {{grade_card}}

      Explain available actions:
      1. **Post review** — add grade card as ADO comment on work item #{{work_item_id}}
      2. **Improve story** — apply fixes based on findings (guided improvement using review context)
      3. **Argue back** — challenge specific grades with evidence
      4. **Done** — end review

      Execute the user's choice:
      - For "Post review": use MCP to add comment on the work item
      - For "Argue back": discuss the challenged grades, re-grade if warranted
      - For "Improve story": signal that the improve sub-recipe should run
      - For "Done": wrap up

      Never block the user. PM has final say on all grades.
    output: "user_action"

  # Phase 4b: Improve sub-recipe (internal only — no standalone SKILL.md)
  - id: "improve-story"
    type: "recipe"
    recipe: "ado-story-improve"
    condition: "'improve' in user_action.lower()"
    sub_context:
      work_item_id: "{{work_item_id}}"
      selected_workspace: "{{selected_workspace}}"
      grade_card: "{{grade_card}}"
      grading_results: "{{grading_results}}"

  # Phase 5: Reflection
  - id: "reflect"
    type: "agent"
    prompt: |
      Store a discovery summarizing this review:
      - Story ID: #{{work_item_id}}
      - Final grades from grade card
      - Key issues found
      - Whether user posted review, improved, argued, or exited
      - Any recurring patterns across past reviews

      Use store_discovery(content, category="ado-story-review") to persist.

      Grade card: {{grade_card}}
      User action: {{user_action}}
    output: "reflection"
