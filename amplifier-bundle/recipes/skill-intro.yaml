name: "skill-intro"
description: "Shared greeting sub-recipe for all ADO skills. Standardized intro that cannot be skipped."
version: "1.0.0"
author: "Amplihack Team"
tags: ["ado", "internal", "shared"]

# INTERNAL SUB-RECIPE — No SKILL.md, no bundle.md registration
# Called by: ado-story-review, ado-feature-review, ado-story-creation,
#            ado-feature-creation, ado-task-planning

context:
  skill_name: ""
  skill_description: ""
  what_i_need: ""

steps:
  - id: "greet"
    type: "agent"
    prompt: |
      You are starting a new skill session. Introduce yourself with a brief,
      warm greeting. Sound like a PM, not a CLI.

      Say: "I'm your {{skill_name}}, and {{skill_description}}"

      Then ask one plain question based on what you need:
      "{{what_i_need}}"

      No scaffolding, no menus, no framework names. One question.
    output: "user_input"
