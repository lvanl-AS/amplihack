name: "CAB_cram-scoring"
description: "Generate a CRAM risk assessment from ADO stories and linked PRs. Skips data fetch phases when expert context is pre-provided."
version: "2.0.0"
author: "Amplihack Team"
tags: ["release", "risk-assessment", "change-management", "cram"]

context:
  selected_workspace: ""
  # Primary input: story IDs (comma-separated)
  story_ids: ""
  # Optional: feature ID to expand into story IDs
  feature_id: ""
  # Pre-computed context (from CR workflow). If both ado_context and
  # code_changes are non-empty, Phases 1-3 are skipped entirely.
  ado_context: ""
  code_changes: ""
  pipeline_data: ""
  deployment_configs: ""
  final_cr: ""
  # Pre-computed risk classification (from CR workflow or standalone step)
  risk_classification: ""
  # Internal state
  auth_status: ""
  expanded_story_ids: ""
  all_story_ids: ""
  stories_data: ""
  feature_ids: ""
  features_data: ""
  linked_prs: ""
  checkpoint_result: ""
  additional_pr_ids: ""
  additional_prs: ""
  repo_names: ""
  cram_template: ""
  cram_scores: ""
  reviewed_cram: ""
  final_scores_json: ""
  final_cram: ""
  persist_status: ""
  cleanup_status: ""
  reflection: ""

steps:
  # ============================================================
  # Phase 1a: Story & Feature Fetch
  # SKIPPED when ado_context and code_changes are already provided.
  # ============================================================

  # Step 1: Auth check
  - id: "auth-check"
    type: "bash"
    condition: "ado_context == '' or code_changes == ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/auth_check.py \
        --workspace "{{selected_workspace}}" --quiet
    output: "auth_status"

  # Step 2: If feature_id provided, expand to child story IDs
  - id: "expand-feature"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and feature_id != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/extract_child_ids.py \
        --parent-id {{feature_id}} \
        --workspace "{{selected_workspace}}"
    output: "expanded_story_ids"

  # Step 3: Combine story_ids + expanded_story_ids, deduplicate
  - id: "combine-story-ids"
    type: "bash"
    condition: "ado_context == '' or code_changes == ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/combine_ids.py <<'IDS_EOF'
      {{story_ids}}
      {{expanded_story_ids}}
      IDS_EOF
    output: "all_story_ids"

  # Step 4: Fetch all stories with relations
  - id: "fetch-stories"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and all_story_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/fetch_child_stories.py \
        --ids "{{all_story_ids}}" \
        --workspace "{{selected_workspace}}"
    output: "stories_data"

  # Step 5: Extract parent feature IDs from story relations
  - id: "extract-parent-features"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and stories_data != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/extract_parent_ids.py <<'STORIES_EOF'
      {{stories_data}}
      STORIES_EOF
    output: "feature_ids"

  # Step 6: Fetch parent features for context
  - id: "fetch-features"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and feature_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/fetch_child_stories.py \
        --ids "{{feature_ids}}" \
        --workspace "{{selected_workspace}}"
    output: "features_data"

  # Step 7: Fetch linked PRs for all stories
  - id: "fetch-linked-prs"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and all_story_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_linked_prs.py \
        --ids "{{all_story_ids}}" \
        --workspace "{{selected_workspace}}" \
        --detail
    output: "linked_prs"

  # ============================================================
  # Phase 1b: PR Checkpoint
  # SKIPPED when expert context is pre-provided.
  # ============================================================

  # Step 8: Present stories + PRs, ask for additional PRs
  - id: "pr-checkpoint"
    type: "agent"
    condition: "ado_context == '' or code_changes == ''"
    prompt: |
      You are reviewing the contents of a deployment before generating a
      CRAM risk assessment.

      Present a clean summary of what was found:

      **Stories in this assessment:**
      For each story, show: ID, Title, State, Assigned To

      **Parent Feature(s):**
      For each feature, show: ID, Title

      **PRs linked to stories:**
      For each PR, show: PR ID, Title, Repository, Status, Linked Story ID

      Stories: {{stories_data}}
      Features: {{features_data}}
      Linked PRs: {{linked_prs}}

      Then ask:

      "These PRs were found automatically from your ADO stories.
      Are there any additional PRs that should be included in this
      risk assessment? Provide PR IDs (comma-separated), or say 'none'."

      After the user responds, confirm the complete list.

      Your FINAL message MUST end with exactly this block:
      ===ADDITIONAL_DATA===
      PRS: <comma-separated additional PR IDs, or leave blank>
      ===END_ADDITIONAL_DATA===
    output: "checkpoint_result"

  # Step 9: Parse additional PR IDs from checkpoint
  - id: "parse-additional-prs"
    type: "bash"
    condition: "ado_context == '' or code_changes == ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/parse_checkpoint.py --field prs <<'CHECKPOINT_EOF'
      {{checkpoint_result}}
      CHECKPOINT_EOF
    output: "additional_pr_ids"

  # Step 10: Fetch additional standalone PRs
  - id: "fetch-additional-prs"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and additional_pr_ids != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/fetch_prs_by_ids.py \
        --ids "{{additional_pr_ids}}" \
        --workspace "{{selected_workspace}}" \
        --detail
    output: "additional_prs"

  # ============================================================
  # Phase 2: Deployment Data Fetch
  # SKIPPED when expert context is pre-provided (pipeline_data
  # and deployment_configs passed in directly).
  # ============================================================

  # Step 11: Extract unique repo names from all PR sources
  - id: "extract-repo-names"
    type: "bash"
    condition: "ado_context == '' or code_changes == ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/extract_repo_names.py <<'PR_DATA_EOF'
      {{linked_prs}}
      ===SOURCE===
      {{additional_prs}}
      PR_DATA_EOF
    output: "repo_names"

  # Step 12: Fetch deployment.yaml from each repo
  - id: "fetch-deployment-configs"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and repo_names != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_repo_file.py \
        --repository "{{repo_names}}" \
        --path deployment.yaml \
        --workspace "{{selected_workspace}}"
    output: "deployment_configs"

  # Step 13: Fetch pipeline definitions and recent runs
  - id: "fetch-pipeline-data"
    type: "bash"
    condition: "(ado_context == '' or code_changes == '') and repo_names != ''"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_pipeline_runs.py \
        --repositories "{{repo_names}}" \
        --workspace "{{selected_workspace}}" \
        --top 5
    output: "pipeline_data"

  # ============================================================
  # Phase 3: Expert Understanding
  # SKIPPED when ado_context and code_changes are pre-provided.
  # ============================================================

  # Step 14a: ADO Context Expert -- what and why
  - id: "ado-context-expert"
    type: "agent"
    agent: "ado-context-expert"
    condition: "ado_context == '' or code_changes == ''"
    prompt: |
      Build a structured context reference document from the ADO data.
      This will be used for CRAM risk scoring across 3 weighted categories:
      Business Impact, Execution Risk, and Operational Risk.

      Focus on extracting:
      - System tier classification and criticality (Business Impact: System Criticality)
      - Guest-facing vs internal impact, outage potential (Business Impact: Customer Impact)
      - Compliance or regulatory requirements (Business Impact: Regulatory Compliance)
      - Acceptance criteria completeness and story states (Execution Risk: Testing Coverage)
      - Scope, team count, integration complexity (Execution Risk: Change Complexity)
      - Vendor or third-party dependencies (Operational Risk: Vendor Dependency)
      - Deployment readiness signals (Operational Risk: Operational Readiness)

      Stories: {{stories_data}}
      Features: {{features_data}}
    output: "ado_context"

  # Step 14b: Code Changes Expert -- how and where
  - id: "code-changes-expert"
    type: "agent"
    agent: "code-changes-expert"
    condition: "ado_context == '' or code_changes == ''"
    prompt: |
      Build a structured code changes reference document from all PR data.
      This will be used for CRAM risk scoring across 3 weighted categories:
      Business Impact, Execution Risk, and Operational Risk.

      Focus on extracting:
      - Systems and services directly modified, tier indicators (Business Impact: System Criticality)
      - Customer-facing surface changes (Business Impact: Customer Impact)
      - Repo count, team count, integration depth, system count (Execution Risk: Change Complexity)
      - Test files in diffs, PR review status, revert history (Execution Risk: Testing Coverage)
      - Migration files, rollback time signals, feature flags, pipeline configs (Execution Risk: Rollback Feasibility)
      - Security-sensitive file changes, quality gate configs (Operational Risk: Secure Coding)
      - RR testing evidence, recovery automation (Operational Risk: Resilience & Recovery)
      - Vendor/third-party integration changes (Operational Risk: Vendor Dependency)

      Linked PRs: {{linked_prs}}
      Additional PRs: {{additional_prs}}
    output: "code_changes"

  # ============================================================
  # Phase 4: Risk Classification + CRAM Scoring
  # Risk Decision Tree runs standalone only (skipped when pre-provided).
  # CRAM scoring always runs.
  # ============================================================

  # Step 15: Risk Decision Tree classification (standalone only)
  - id: "risk-decision-tree"
    type: "agent"
    condition: "risk_classification == ''"
    prompt: |
      Classify this change using the Alaska Airlines Risk Decision Tree v0.93.
      This is a DETERMINISTIC algorithm — follow the tree exactly.

      DECISION TREE (evaluate in order, stop at first match):

      1. Does this change impact or interact with a Ground Stop App or
         Customer Facing App? (Account, BTS, ABD, CSA Mobile)
         Check ADO Context → Section 2 → Ground Stop flags
         Check Code Changes → Section 2 → Ground Stop flags
         → YES → **HIGH RISK**

      2. Does the change affect any Shared Service?
         (Network, middleware, API consumed by multiple apps/teams)
         Check ADO Context → Section 2 → Shared Service flags
         Check Code Changes → Section 2 → Shared Service / Multi-Consumer API flags
         → YES → **HIGH RISK**

      3. If the Change Fails, what is the blast radius?
         Check ADO Context → Risk Decision Tree → Blast Radius Assessment
         Check Code Changes → Risk Decision Tree → Blast Radius from Code Perspective
         → All Users → **HIGH RISK**
         → Some Users → **MEDIUM RISK**

      4. Change is fully tested in a mirror of the live environment?
         Check ADO Context → Risk Decision Tree → Testing Completeness Signal
         Check Code Changes → Risk Decision Tree → Mirror Testing Signal
         → Less than 100% Tested → **MEDIUM RISK**
         → 100% Successfully Tested → **LOW RISK**

      5. All Other Changes:
         → If Standard Change → **LOW RISK**
         → Otherwise → **MEDIUM RISK**

      OUTPUT your classification as:
      ===RISK_CLASSIFICATION===
      RISK_LEVEL: <LOW/MEDIUM/HIGH>
      TREE_BRANCH: <which branch was triggered>
      GROUND_STOP: <true/false>
      SHARED_SERVICE: <true/false>
      BLAST_RADIUS: <all_users/some_users/limited/unknown>
      MIRROR_TESTED: <yes/no/unknown>

      APPROVAL_REQUIRED:
      - Normal period: <approvals needed>
      - Soft freeze (Fri-Sun): <additional approvals if applicable>
      - Hard freeze: <additional approvals if applicable>

      CHANGE_TYPE_GUIDANCE:
      - <guidance based on classification>

      DEADLINE_REMINDER:
      - Friday 6:00 PM PST: CR submission deadline
      - Thursday 2:00 PM PST: CAB meeting
      ===END_RISK_CLASSIFICATION===

      ADO Context: {{ado_context}}
      Code Changes: {{code_changes}}
    output: "risk_classification"

  # Persist expert context to working directory for context compaction resilience
  - id: "persist-expert-context"
    type: "bash"
    condition: "ado_context != '' and code_changes != ''"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      WORKING_DIR="$REPO_ROOT/.claude/runtime/cab_working"
      mkdir -p "$WORKING_DIR"
      cat <<'PERSIST_ADO_EOF' > "$WORKING_DIR/ado_context.md"
      {{ado_context}}
      PERSIST_ADO_EOF
      cat <<'PERSIST_CODE_EOF' > "$WORKING_DIR/code_changes.md"
      {{code_changes}}
      PERSIST_CODE_EOF
      cat <<'PERSIST_RISK_EOF' > "$WORKING_DIR/risk_classification.md"
      {{risk_classification}}
      PERSIST_RISK_EOF
      cat <<'PERSIST_PIPE_EOF' > "$WORKING_DIR/pipeline_data.md"
      {{pipeline_data}}
      PERSIST_PIPE_EOF
      cat <<'PERSIST_DEPLOY_EOF' > "$WORKING_DIR/deployment_configs.md"
      {{deployment_configs}}
      PERSIST_DEPLOY_EOF
      echo "Persisted expert context to $WORKING_DIR"
    output: "persist_status"

  # Step 16: Load CRAM template (always needed)
  - id: "load-cram-template"
    type: "bash"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      cat "$REPO_ROOT/amplifier-bundle/skills/common/templates/reference_cram_template.md"
    output: "cram_template"

  # Step 17: CRAM Scorer — produces structured JSON scores
  - id: "cram-scorer"
    type: "agent"
    agent: "cram-scorer"
    prompt: |
      Score this change across all 3 CRAM categories (Business Impact,
      Execution Risk, Operational Risk) and their 11 subcriteria using the
      Alaska Airlines CRAM scoring rubric and expert reference documents.

      SCORING PROCESS:
      1. Start with the high-variance subcriteria (System Criticality,
         Customer Impact, Secure Coding, Testing Coverage, Resilience &
         Recovery) — these drive most of the score differentiation.
      2. For low-variance subcriteria (Change Window, Vendor Dependency,
         Regulatory Compliance, Operational Readiness, Rollback Feasibility),
         use the team's historical baseline as the default and only deviate
         if specific evidence contradicts it.
      3. For each score, match to the rubric criteria text for the best-fit
         level. Cite specific data points in the justification (repos, PR
         numbers, story IDs, teams, line counts).
      4. Flag data gaps explicitly — especially for Secure Coding (quality
         gate status is never in code) and Resilience & Recovery (RR test
         evidence may not be in PRs).
      5. Flag low-confidence scores — subcriteria where the evidence is
         ambiguous and the score could reasonably go +/- 1 level. The
         review step will ask the user about these. Most commonly:
         Customer Impact, Change Complexity, Testing Coverage, Rollback
         Feasibility, Operational Readiness.
      6. Use the Scoring Calibration section in the rubric to sanity-check
         your scores against historical patterns.

      OBJECTIVE THRESHOLDS (not subjective — apply these deterministically):
      - Ground Stop apps (Account, BTS, ABD, CSA Mobile) = System Criticality 3, always
      - Shared service / multi-consumer API = System Criticality 2 minimum
      - Maintenance window: 10:30 PM - 4:00 AM = Change Window 1
      - Soft freeze (Fri 12AM - Sun 11:59PM) = Change Window 2 minimum
      - Hard freeze = Change Window 3
      - SonarQube Alaska Standard = 70% coverage for Secure Coding 1
      - PCI changes: ALL vulns resolved needed for Secure Coding 1
      - Blast radius All Users = Customer Impact 3
      - Blast radius Some Users = Customer Impact 2

      CRAM Scoring Rubric (includes calibration data): {{cram_template}}

      Risk Decision Tree Classification: {{risk_classification}}
      ADO Context (what/why): {{ado_context}}
      Code Changes (how/where): {{code_changes}}
      Pipeline Data (optional): {{pipeline_data}}
      Deployment Configs (optional): {{deployment_configs}}
      Final CR (optional, for cross-reference): {{final_cr}}

      OUTPUT: You MUST produce the JSON block exactly as specified in the
      Output Format section of the CRAM template. Wrap it in
      ===CRAM_SCORES=== and ===END_CRAM_SCORES=== sentinels.
      Every score must be an integer 1, 2, or 3. Every justification must
      cite specific evidence from the expert documents.
    output: "cram_scores"

  # ============================================================
  # Phase 5: User Review
  # ============================================================

  # Step 18: Walk through scores with user
  - id: "review-scores"
    type: "agent"
    prompt: |
      Present the CRAM risk assessment to the user for review.

      Extract the JSON from between ===CRAM_SCORES=== and
      ===END_CRAM_SCORES=== in the scorer output below.

      Present each category clearly:

      **Business Impact (Weight = 3, Method: Highest × 3)**
      For each subcriterion show: Name | Score | Justification
      Show weighted result.

      **Execution Risk (Weight = 2, Method: Average × 2)**
      Same format.

      **Operational Risk (Weight = 1, Method: Average × 1)**
      Same format.

      Show the total weighted score and risk level.

      IMPORTANT — USER DIALOGUE FOR UNCERTAIN SCORES:
      After presenting scores, check TWO arrays from the scorer output:

      **1. "low_confidence" — Subjective scores the scorer wasn't sure about.**
      These are scores where the data was ambiguous, not missing. For each
      low-confidence subcriterion, explain what the scorer found, what score
      it chose, and why it's uncertain. Then ask the user to confirm or
      adjust. Use targeted questions based on the subcriterion:

      - **Customer Impact**: "The scorer rated this {{score}}. Would a
        failure in this change be noticeable to guests, or is it internal-
        only? Would it cause degraded service or a full outage?"
      - **Change Complexity**: "The scorer rated this {{score}} based on
        {{N}} repos. How many teams are actually coordinating on this
        deployment? Are there integration points the code doesn't show?"
      - **Testing Coverage**: "The scorer rated this {{score}} — no test
        files were found in the diffs. Was testing done outside the PR
        workflow (manual QA, staging validation, etc.)?"
      - **Rollback Feasibility**: "The scorer estimated rollback at
        {{score}}. What's your team's realistic rollback time for this
        type of change?"
      - **Operational Readiness**: "The scorer defaulted this to {{score}}.
        Are all of these confirmed: CR doc, monitoring dashboard, on-call
        assignment, runbook review?"

      **2. "data_gaps" — Missing data that forced conservative scoring.**
      For each gap, ask for the missing info directly:

      - **Secure Coding**: "What is the SonarQube quality gate status?
        (Standard/Security Plus/None, and any Critical/High vulnerabilities?)"
      - **System Criticality**: "What ORBIS tier is this system?
        (0=Infrastructure, 1=Critical ops/check-in, 2=Revenue/employee, 3=Not critical)"
      - **Resilience & Recovery**: "Has RR testing been completed? Recovery
        time? (Automated <1hr / Manual <2hr / Not tested)"
      - **Change Window**: "Is the deployment during the approved maintenance
        window, or off-hours/peak/freeze?"

      Only ask about items that appear in those arrays. Do NOT ask about
      subcriteria where the scorer had clear evidence and high confidence.

      Present all questions together in a single numbered list so the user
      can answer in one pass.

      Then offer: "Any other scores you want to adjust?"
      Common user adjustments beyond the above:
      - Mitigations not visible in code (feature flags, staging validation)
      - Rollback time estimates from team knowledge
      - Testing done outside the PR workflow

      If the user adjusts scores, recalculate the weighted totals and
      risk level using the official formulas:
      - Business Impact = highest of (1a, 1b, 1c) × 3
      - Execution Risk = average of (2a, 2b, 2c) × 2
      - Operational Risk = average of (3a, 3b, 3c, 3d, 3e) × 1
      - Total = sum of weighted scores
      - Risk: 6-10 Low, 11-15 Medium, 16-18 High

      CALIBRATION CHECK: No High Risk (16-18) has ever been scored for
      this team. Historical range is 6-15, mean 10.8. If total >= 16,
      flag this to the user as unusual and confirm.

      When the user approves, output the final scores JSON wrapped in:
      ===CRAM_APPROVED===
      {"scores": {<all 11 scores>}}
      ===END_CRAM===

      Scorer output: {{cram_scores}}
    output: "reviewed_cram"

  # Step 19: Parse approved scores and generate Excel
  - id: "parse-approved-scores"
    type: "bash"
    condition: "'===CRAM_APPROVED===' in reviewed_cram"
    command: |
      python3 -c "
      import sys, json, re
      text = sys.stdin.read()
      m = re.search(r'===CRAM_APPROVED===\s*(\{.*?\})\s*===END_CRAM===', text, re.DOTALL)
      if not m:
          print('Error: Could not parse approved scores', file=sys.stderr)
          sys.exit(1)
      data = json.loads(m.group(1))
      print(json.dumps(data.get('scores', data)))
      " <<'REVIEW_EOF'
      {{reviewed_cram}}
      REVIEW_EOF
    output: "final_scores_json"

  # Step 20: Generate CRAM Excel workbook
  - id: "generate-cram-xlsx"
    type: "bash"
    condition: "final_scores_json != ''"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      TIMESTAMP=$(date +%Y%m%d-%H%M%S)
      OUTPUT_DIR="$REPO_ROOT/.claude/runtime/output"
      mkdir -p "$OUTPUT_DIR"
      OUTPUT_FILE="$OUTPUT_DIR/CRAM-${TIMESTAMP}.xlsx"

      # Use venv python for openpyxl; fall back to system python3
      PYTHON="$REPO_ROOT/.venv/bin/python3"
      if [ ! -x "$PYTHON" ]; then
        PYTHON="python3"
      fi

      echo '{{final_scores_json}}' | \
        "$PYTHON" "$REPO_ROOT/.claude/scenarios/az-devops-tools/generate_cram_xlsx.py" \
          -o "$OUTPUT_FILE"
    output: "final_cram"

  # ============================================================
  # Phase 6: Reflection
  # ============================================================

  # Step 21: Store discovery
  - id: "reflect"
    type: "agent"
    prompt: |
      Store discovery for category "CAB_cram-scoring":
      - Overall risk score and level
      - Which dimension scored highest risk and why
      - Data gaps that forced conservative scoring
      - Whether context was pre-provided (from CR workflow) or fetched fresh
      - User adjustments made during review (signals where data doesn't
        capture the full picture)
      - Risk Decision Tree classification and alignment with CRAM total score
        (did CRAM level match tree level? If not, note the discrepancy)
      - Objective thresholds triggered: Ground Stop, shared service, maintenance
        window, freeze, SonarQube, PCI, blast radius — which applied, which didn't
      - Patterns observed (e.g., "repos without tests score low confidence",
        "multi-repo changes always elevate complexity")

      Final CRAM path: {{final_cram}}
      Approved scores: {{final_scores_json}}
      Risk Classification: {{risk_classification}}
      ADO Context: {{ado_context}}
      Code Changes: {{code_changes}}
    output: "reflection"

  # Cleanup working files
  - id: "cleanup-working-files"
    type: "bash"
    command: |
      REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
      rm -rf "$REPO_ROOT/.claude/runtime/cab_working"
      echo "Cleaned up working files"
    output: "cleanup_status"
