name: "ado-feature-improve"
description: "Internal sub-recipe for improving a feature based on review findings. Requires review context — cannot run standalone."
version: "1.0.0"
author: "Amplihack Team"
tags: ["ado", "internal", "improve"]

# INTERNAL SUB-RECIPE — No SKILL.md, no bundle.md registration
# Called by: ado-feature-review ONLY
# Requires: grade_card, grading_results from parent recipe context

context:
  work_item_id: ""
  selected_workspace: ""
  grade_card: ""
  grading_results: ""

steps:
  # Validate context — fail fast if called without review data
  - id: "validate-context"
    type: "bash"
    command: |
      if [ -z "{{grade_card}}" ] || [ -z "{{grading_results}}" ]; then
        echo "ERROR: This sub-recipe requires review context (grade_card, grading_results)."
        echo "It cannot run standalone — use ado-feature-review first, then choose 'Improve feature'."
        exit 1
      fi
      echo "Context validated — review data present."
    output: "context_valid"

  # Fetch the Feature template for deterministic HTML assembly
  - id: "load-template"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_templates.py \
        --type Feature \
        --workspace "{{selected_workspace}}" \
        --fields-only \
        | tee /tmp/ado_feature_{{work_item_id}}_template.json
    output: "feature_template"

  # Fetch current work item fields to know what exists
  - id: "fetch-current-fields"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_work_item.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --fields "System.Description,Microsoft.VSTS.Common.AcceptanceCriteria" \
        --format json
    output: "current_fields"

  # Draft improvements — agent outputs sections JSON, not raw HTML
  - id: "improve-feature"
    type: "agent"
    prompt: |
      Using the review findings, draft improvements to this feature.

      The current work item content:
      {{current_fields}}

      The template structure (for section reference):
      {{feature_template}}

      For each dimension graded below B:
      - Show the before/after for the specific section
      - Ensure Without/With framing is correct in WHY section
      - Ensure all three Win audiences are covered
      - Ensure quality measures are guardrails, not success metrics

      Present all proposed changes to the user for approval.

      Once the user approves (or requests edits), write the final approved content
      to this file:

        /tmp/ado_feature_{{work_item_id}}_sections.json

      Format — include ALL sections (improved + unchanged) so the template filler
      produces a complete document:
      {
        "System.Description": {
          "what": "<improved or existing content>",
          "why": "<improved or existing — must use Without/With framing>",
          "who": "<improved or existing>",
          "guest_wins": "<improved or existing>",
          "business_wins": "<improved or existing>",
          "tech_wins": "<improved or existing>",
          "quality_measure_ac": "<improved or existing>",
          "additional_considerations": "<improved or existing>"
        },
        "Microsoft.VSTS.Common.AcceptanceCriteria": {
          "outcome": "<improved or existing>",
          "additional_context": "<improved or existing>"
        }
      }

      Content can be markdown — the fill tool converts to HTML automatically.
      Only include fields that have content in the work item. If a field
      (Description or AC) was not changed, omit its key entirely so the
      commit step knows to skip it.

      Output a one-line summary of what was written, e.g.:
        "Wrote sections: description (what, why, wins), ac (outcome)"

      Work item: #{{work_item_id}}
      Grade card: {{grade_card}}
      Grading details: {{grading_results}}

      Do NOT call any MCP tools or update_work_item.py directly.
      Do NOT write HTML files — the fill-template step handles that.
    output: "improvements_staged"

  # Deterministic HTML assembly from template + improved sections
  - id: "fill-template"
    type: "bash"
    command: |
      SECTIONS="/tmp/ado_feature_{{work_item_id}}_sections.json"
      TEMPLATE="/tmp/ado_feature_{{work_item_id}}_template.json"

      if [ ! -f "$SECTIONS" ]; then
        echo "No sections file — nothing to fill."
        exit 0
      fi
      if [ ! -f "$TEMPLATE" ]; then
        echo "No template file — cannot fill."
        exit 1
      fi

      python3 .claude/scenarios/az-devops-tools/fill_template.py \
        --template-file "$TEMPLATE" \
        --sections-file "$SECTIONS" \
        --output-dir /tmp/ado_feature_{{work_item_id}}_filled/

      # Move to expected paths for commit step
      [ -f /tmp/ado_feature_{{work_item_id}}_filled/description.html ] && \
        mv /tmp/ado_feature_{{work_item_id}}_filled/description.html \
           /tmp/ado_feature_{{work_item_id}}_description.html
      [ -f /tmp/ado_feature_{{work_item_id}}_filled/ac.html ] && \
        mv /tmp/ado_feature_{{work_item_id}}_filled/ac.html \
           /tmp/ado_feature_{{work_item_id}}_ac.html

      echo "Template filled."
      ls -la /tmp/ado_feature_{{work_item_id}}_description.html \
             /tmp/ado_feature_{{work_item_id}}_ac.html 2>/dev/null
    output: "template_filled"

  # Deterministic commit — reads filled HTML and calls update_work_item.py
  - id: "commit-improvements"
    type: "bash"
    command: |
      DESC_FILE="/tmp/ado_feature_{{work_item_id}}_description.html"
      AC_FILE="/tmp/ado_feature_{{work_item_id}}_ac.html"

      if [ ! -f "$DESC_FILE" ] && [ ! -f "$AC_FILE" ]; then
        echo "No changes staged — temp files not found. Nothing to commit."
        exit 0
      fi

      ARGS=(--id {{work_item_id}} --workspace "{{selected_workspace}}" --no-format)

      if [ -f "$DESC_FILE" ]; then
        DESCRIPTION=$(cat "$DESC_FILE")
        ARGS+=(--description "$DESCRIPTION")
      fi

      if [ -f "$AC_FILE" ]; then
        AC=$(cat "$AC_FILE")
        ARGS+=(--field "Microsoft.VSTS.Common.AcceptanceCriteria=$AC")
      fi

      echo "Committing improvements to ADO work item #{{work_item_id}}..."
      python3 .claude/scenarios/az-devops-tools/update_work_item.py "${ARGS[@]}"
    output: "commit_result"

  # Cleanup temp files
  - id: "cleanup-temp"
    type: "bash"
    command: |
      rm -f /tmp/ado_feature_{{work_item_id}}_sections.json
      rm -f /tmp/ado_feature_{{work_item_id}}_template.json
      rm -f /tmp/ado_feature_{{work_item_id}}_description.html
      rm -f /tmp/ado_feature_{{work_item_id}}_ac.html
      rm -rf /tmp/ado_feature_{{work_item_id}}_filled/
      echo "Temp files cleaned up."
    output: "cleanup_done"

  # Confirm what landed
  - id: "verify-update"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_work_item.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --fields "System.Title,System.Description,Microsoft.VSTS.Common.AcceptanceCriteria" \
        --format json
    output: "verified_state"

  # Surface the result to the user
  - id: "report"
    type: "agent"
    prompt: |
      The improvements have been committed to ADO. Report the outcome to the user:

      - Confirm which fields were updated (description, AC, or both)
      - Show a diff summary of key changes made vs. the original grade card findings
      - Note any dimensions that still need attention if the user only approved partial changes

      Commit result: {{commit_result}}
      Verified state: {{verified_state}}
      Improvements staged: {{improvements_staged}}
      Grade card: {{grade_card}}
    output: "report"
