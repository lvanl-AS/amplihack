name: "ado-task-planning"
description: "Decompose a user story into actionable sprint tasks"
version: "2.0.0"
author: "Amplihack Team"
tags: ["ado", "tasks", "planning"]

context:
  selected_workspace: ""
  work_item_id: ""
  auth_status: ""
  story_data: ""
  template_tasks_created: ""
  story_understanding: ""
  metrics_understanding: ""
  ac_task_list: ""
  technical_discussion_result: ""
  anti_pattern_flags: ""
  final_task_list: ""
  user_approval: ""
  created_tasks: ""
  reflection: ""

steps:
  # --- Bash steps first: prove value fast, catch errors early ---

  # Step 1: Auth check
  - id: "auth-check"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/auth_check.py \
        --workspace "{{selected_workspace}}" --quiet
    output: "auth_status"

  # Step 2: Fetch parent story with relations
  - id: "fetch-parent-story"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/get_work_item.py \
        --id {{work_item_id}} \
        --workspace "{{selected_workspace}}" \
        --relations --format json
    output: "story_data"

  # Step 3: Validate parent is a User Story + create mandatory template tasks
  # Validates type, fetches Task templates, creates each one on the story
  # with inherited iteration/area. Done before any agent work.
  - id: "create-template-tasks"
    type: "bash"
    command: |
      python3 .claude/scenarios/az-devops-tools/create_template_tasks.py \
        --parent-id {{work_item_id}} \
        --workspace "{{selected_workspace}}"
    output: "template_tasks_created"

  # --- Agent steps: understanding, decomposition, discussion ---

  # Step 4a: Understand — story architect
  - id: "understand-story"
    type: "agent"
    agent: "ado-story-architect"
    prompt: |
      Review this story for structure, AC quality, and gaps.
      Provide your analysis — this will feed into task decomposition.

      Story: {{story_data}}
    output: "story_understanding"

  # Step 4b: Understand — metrics coach
  - id: "understand-metrics"
    type: "agent"
    agent: "ado-metrics-coach"
    prompt: |
      Review this story for observability and metrics gaps.
      Provide your analysis — this will feed into task decomposition.

      Story: {{story_data}}
    output: "metrics_understanding"

  # Step 5: Decompose — AC-covering tasks
  - id: "decompose-ac-tasks"
    type: "agent"
    agent: "ado-task-planner"
    prompt: |
      Decompose this story into work-area tasks that cover the
      acceptance criteria. Template tasks (CR, PR, Documentation, DOD, RFA)
      have already been created in ADO — focus on story-specific work areas only.

      Story: {{story_data}}
      Story understanding: {{story_understanding}}
      Metrics understanding: {{metrics_understanding}}
    output: "ac_task_list"

  # Step 6: Technical work area discussion
  - id: "technical-discussion"
    type: "agent"
    agent: "ado-technical-advisor"
    prompt: |
      Review the story and current task list. Surface implicit
      technical work areas not covered by the current tasks.
      Discuss with the user — they decide what gets added.

      Story: {{story_data}}
      Story understanding: {{story_understanding}}
      Metrics understanding: {{metrics_understanding}}
      Current tasks: {{ac_task_list}}
    output: "technical_discussion_result"

  # Step 7: Anti-pattern critique
  - id: "anti-pattern-check"
    type: "agent"
    prompt: |
      Review the full task list (AC tasks + any user-approved
      technical tasks) for anti-patterns:
      1. Task is too specific — names technologies or implementations
      2. Task is actually a story — describes behavior, not work area
      3. Task is too broad — spans too many concerns
      4. Title over 50 characters

      0-3 soft warnings in plain English. Advisory only.

      AC-covering tasks: {{ac_task_list}}
      Technical discussion (may include additional tasks): {{technical_discussion_result}}
      Story: {{story_data}}
    output: "anti_pattern_flags"

  # Step 8: Iterate with user
  - id: "iterate-with-user"
    type: "agent"
    prompt: |
      Present the final task list as a clear scannable block.
      Combine the AC-covering tasks with any user-approved tasks
      from the technical discussion into a single list.
      Include anti-pattern flags as "things worth noting."

      User can: split, merge, add, drop, retitle tasks.
      Template tasks (CR, PR, Documentation, DOD, RFA) are already
      created in ADO — they are not listed here.
      Enforce 50-char title limit on any changes.
      Loop until happy.

      "Sizing comes later — your team handles that in planning."

      AC-covering tasks: {{ac_task_list}}
      Technical discussion: {{technical_discussion_result}}
      Flags: {{anti_pattern_flags}}
    output: "final_task_list"

  # Step 9: Final approval
  - id: "approval-gate"
    type: "agent"
    prompt: |
      Present final confirmation:
      "Ready to create these tasks under story #{{work_item_id}}?"

      Show task count and list.
      User confirms -> proceed.
      User cancels -> return to iteration.

      Tasks: {{final_task_list}}
    output: "user_approval"

  # Step 10: Write to ADO
  - id: "write-tasks"
    type: "agent"
    condition: "'confirm' in user_approval.lower()"
    prompt: |
      Create each task in ADO using create_work_item.py:
      1. For each task: --type Task --title "..." --parent {{work_item_id}} --workspace "{{selected_workspace}}"
      2. Extract iteration and area from the parent story data and pass as --iteration and --area
      3. No sizing fields — leave blank

      After all created, post summary comment on parent story
      listing all task IDs and titles as audit trail.

      Tasks: {{final_task_list}}
      Parent story: {{story_data}}
      Parent ID: {{work_item_id}}
      Workspace: {{selected_workspace}}
    output: "created_tasks"

  # Step 11: Reflection
  - id: "reflect"
    type: "agent"
    prompt: |
      Store discovery for category "ado-task-planning":
      - Parent story ID, task count
      - Anti-pattern flags raised vs overridden
      - Technical work areas surfaced vs accepted
      - Team patterns observed

      Created: {{created_tasks}}
    output: "reflection"
